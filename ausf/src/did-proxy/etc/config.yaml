# DID Proxy Configuration for AUSF
# This configuration file is used by the DID Proxy to generate DIDs and
# register with the BCF (Blockchain Function)

log_level:
  general: debug

http_version: 2

register_nf:
  general: yes

register_bcf:
  general: yes

# DID Proxy specific settings
extended_profile_path: /usr/local/etc/oai/extended_ausf_profile.json
key_store_path: /usr/local/etc/oai/keys

# AUSF Configuration
ausf:
  ausf_name: oai-ausf
  # nf_instance_id: auto-generated if not specified

# Network Functions
nfs:
  ausf:
    host: 10.29.124.26
    sbi:
      port: 8081
      api_version: v1
      interface_name: wlo1
  bcf:
    host: 10.29.124.26
    sbi:
      port: 8089
      api_version: v1
      interface_name: wlo1
